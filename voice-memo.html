<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VoiceMemo">
<title>VoiceMemo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root { --bg:#0d0d14; --surface:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.08); --text:#e2e8f0; --muted:#64748b; }
  body { background:var(--bg); color:var(--text); font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif; min-height:100vh; min-height:100dvh; overscroll-behavior:none; }

  .header { position:sticky; top:0; z-index:20; background:rgba(13,13,20,0.9); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:14px 20px; display:flex; align-items:center; justify-content:space-between; }
  .header-title { font-size:17px; font-weight:700; letter-spacing:.04em; }
  .header-sub { font-size:10px; color:var(--muted); margin-top:2px; }

  .input-area { padding:20px 16px 14px; display:flex; flex-direction:column; gap:10px; }
  .input-hint { font-size:12px; color:var(--muted); text-align:center; padding:2px 0; }
  .input-hint span { background:rgba(99,102,241,0.15); border:1px solid rgba(99,102,241,0.25); border-radius:8px; padding:3px 10px; color:#a5b4fc; }

  textarea { width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:16px; padding:14px 16px; color:var(--text); font-size:16px; font-family:inherit; line-height:1.6; resize:none; outline:none; min-height:100px; transition:border-color .2s; -webkit-appearance:none; }
  textarea:focus { border-color:rgba(99,102,241,0.5); }
  textarea::placeholder { color:#334155; }

  .btn-submit { width:100%; padding:13px; border-radius:14px; border:none; background:linear-gradient(135deg,#6366f1,#8b5cf6); color:white; font-size:15px; font-weight:600; font-family:inherit; cursor:pointer; transition:opacity .2s,transform .1s; }
  .btn-submit:active { opacity:.85; transform:scale(.98); }

  .filters { display:flex; gap:7px; padding:4px 16px 14px; overflow-x:auto; scrollbar-width:none; }
  .filters::-webkit-scrollbar { display:none; }
  .filter-btn { white-space:nowrap; padding:5px 13px; border-radius:20px; border:1px solid var(--border); background:var(--surface); color:var(--muted); font-size:12px; cursor:pointer; font-family:inherit; }
  .filter-btn.active { border-color:#6366f1; background:rgba(99,102,241,0.2); color:#a5b4fc; }

  .memo-list { padding:0 14px 80px; display:flex; flex-direction:column; gap:11px; }
  .empty-state { text-align:center; color:#1e293b; padding:48px 0; font-size:14px; }
  .empty-icon { font-size:36px; display:block; margin-top:12px; }

  .memo-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:14px 14px 14px 18px; position:relative; overflow:hidden; animation:fadeIn .25s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  .memo-accent { position:absolute; left:0; top:0; bottom:0; width:3px; }
  .memo-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:7px; }
  .memo-badges { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .badge-cat { border-radius:7px; padding:2px 10px; font-size:11px; font-weight:700; }
  .badge-pri { border-radius:6px; padding:2px 8px; font-size:11px; }
  .btn-delete { background:none; border:none; color:#334155; font-size:18px; cursor:pointer; padding:2px 4px; line-height:1; flex-shrink:0; }
  .memo-summary { font-weight:600; font-size:15px; color:#f1f5f9; margin-bottom:5px; }
  .memo-text { font-size:13px; color:#94a3b8; line-height:1.65; margin-bottom:9px; }
  .memo-tags { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:9px; }
  .tag { font-size:11px; color:#6366f1; background:rgba(99,102,241,0.1); border:1px solid rgba(99,102,241,0.2); border-radius:6px; padding:2px 8px; }
  .memo-footer { display:flex; align-items:center; justify-content:space-between; }
  .memo-date { font-size:11px; color:#1e293b; }
  .btn-notion { padding:5px 11px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--muted); font-size:12px; cursor:pointer; font-family:inherit; }
  .btn-notion.saved { border-color:rgba(16,185,129,0.3); background:rgba(16,185,129,0.1); color:#34d399; cursor:default; }

  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:rgba(30,30,46,0.95); border:1px solid var(--border); border-radius:12px; padding:10px 20px; font-size:13px; color:var(--text); opacity:0; transition:all .3s; z-index:100; white-space:nowrap; pointer-events:none; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">🎙️ VoiceMemo</div>
    <div class="header-sub">つぶやき → 自動分類 × Notion</div>
  </div>
</div>

<div class="input-area">
  <div class="input-hint">キーボードの <span>🎤 マイクボタン</span> で話すだけ</div>
  <textarea id="memoInput" placeholder="ここをタップ → キーボードの🎤を押して話す&#10;&#10;または直接テキストを入力してもOK"></textarea>
  <button class="btn-submit" onclick="submitMemo()">保存して分類する</button>
</div>

<div class="filters" id="filterBar"></div>
<div class="memo-list" id="memoList"></div>
<div class="toast" id="toast"></div>

<script>
let memos = JSON.parse(localStorage.getItem('vm_memos') || '[]');
let currentFilter = 'すべて';
const MAKE_WEBHOOK = 'https://hook.us2.make.com/sghtnh36azhu45b843aelkxoj6labgok';

const CATEGORIES = {
  'アイデア': { icon:'💡', color:'#F59E0B', bg:'rgba(245,158,11,0.12)' },
  'タスク':   { icon:'✅', color:'#10B981', bg:'rgba(16,185,129,0.12)' },
  'メモ':     { icon:'📝', color:'#6366F1', bg:'rgba(99,102,241,0.12)' },
  '感情':     { icon:'💭', color:'#EC4899', bg:'rgba(236,72,153,0.12)' },
  '学び':     { icon:'📚', color:'#3B82F6', bg:'rgba(59,130,246,0.12)' },
  'その他':   { icon:'🗂️', color:'#6B7280', bg:'rgba(107,114,128,0.12)' },
};

function classify(t) {
  const rules = [
    { cat:'タスク',   re:/やる|する|しなければ|買う|連絡|予約|確認|送る|調べる|作る|締め切り|期限|TODO|todo/ },
    { cat:'アイデア', re:/アイデア|思いついた|どうかな|できそう|面白い|企画|提案|もしも|〜したら|かもしれない/ },
    { cat:'感情',     re:/嬉しい|悲しい|辛い|楽しい|疲れた|怒|不安|ワクワク|モヤ|スッキリ|感動|気持ち/ },
    { cat:'学び',     re:/学んだ|覚えた|知った|発見|なるほど|勉強|読んだ|聞いた|気づき|ポイント|まとめ/ },
    { cat:'メモ',     re:/メモ|覚書|忘れずに|記録|残して|ちなみに|参考/ },
  ];
  for (const r of rules) { if (r.re.test(t)) return r.cat; }
  return 'その他';
}

function extractTags(text) {
  const rules = [
    { tag: 'UAT',             re: /UAT|uat|UA\s*T|UT\b|ユーエーティー|ユーエイティー/ },
    { tag: '免疫チェック',    re: /免疫/ },
    { tag: 'インナーガーデン', re: /インナーガーデン|インナー|IG\b|ig\b/ },
  ];
  const tags = rules.filter(r => r.re.test(text)).map(r => r.tag);
  if (tags.length === 0) tags.push('その他');
  return tags;
}

function getPriority(t) {
  if (/急ぎ|今日|明日|すぐ|早急|重要|大事|必ず/.test(t)) return '高';
  if (/今週|近いうち|そのうち/.test(t)) return '中';
  return '低';
}

function summarize(text) {
  const clean = text.replace(/えーっと|あのー?|そのー?|うーん/g, '').trim();
  return clean.length > 18 ? clean.slice(0, 17) + '…' : clean;
}

function submitMemo() {
  const input = document.getElementById('memoInput');
  const text = input.value.trim();
  if (!text) { showToast('テキストを入力してください'); return; }
  const cat = classify(text);
  const memo = {
    id: Date.now(), text, category: cat,
    summary: summarize(text),
    tags: extractTags(text),
    priority: getPriority(text),
    createdAt: new Date().toLocaleString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}),
    saved: false,
  };
  memos.unshift(memo);
  persist();
  input.value = '';
  input.style.height = 'auto';
  renderFilters();
  renderMemos();
  showToast(`${CATEGORIES[cat].icon} ${cat} として保存しました`);
}

document.getElementById('memoInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 200) + 'px';
});

async function saveToNotion(id) {
  const memo = memos.find(m => m.id === id);
  if (!memo) return;
  const btn = document.querySelector(`[data-notion="${id}"]`);
  if (btn) btn.textContent = '保存中…';
  try {
    const res = await fetch(MAKE_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ summary: memo.summary, category: memo.category, priority: memo.priority, tags: memo.tags, text: memo.text })
    });
    if (res.ok) {
      memo.saved = true; persist(); renderMemos();
      showToast('✅ Notionに保存しました');
    } else {
      showToast('❌ 保存失敗。Makeを確認してください');
      if (btn) btn.textContent = 'Notionに保存';
    }
  } catch {
    showToast('❌ ネットワークエラー');
    if (btn) btn.textContent = 'Notionに保存';
  }
}

function deleteMemo(id) { memos = memos.filter(m => m.id !== id); persist(); renderFilters(); renderMemos(); }

function renderFilters() {
  const cats = ['すべて', ...Object.keys(CATEGORIES).filter(c => memos.some(m => m.category === c))];
  document.getElementById('filterBar').innerHTML = cats.map(c =>
    `<button class="filter-btn${c === currentFilter ? ' active' : ''}" onclick="setFilter('${c}')">${c !== 'すべて' ? CATEGORIES[c].icon + ' ' : ''}${c}</button>`
  ).join('');
}

function setFilter(f) { currentFilter = f; renderFilters(); renderMemos(); }

function renderMemos() {
  const list = document.getElementById('memoList');
  const filtered = currentFilter === 'すべて' ? memos : memos.filter(m => m.category === currentFilter);
  if (!filtered.length) { list.innerHTML = `<div class="empty-state">まだメモがありません<span class="empty-icon">📝</span></div>`; return; }
  list.innerHTML = filtered.map(m => {
    const cat = CATEGORIES[m.category] || CATEGORIES['その他'];
    const priColor = m.priority==='高'?'#f87171':m.priority==='中'?'#fbbf24':'#4b5563';
    const priBg = m.priority==='高'?'rgba(239,68,68,0.1)':m.priority==='中'?'rgba(245,158,11,0.1)':'rgba(75,85,99,0.1)';
    const tags = m.tags.map(t => `<span class="tag">#${t}</span>`).join('');
    const notionBtn = m.saved
      ? `<button class="btn-notion saved">✓ Notion済</button>`
      : `<button class="btn-notion" data-notion="${m.id}" onclick="saveToNotion(${m.id})">Notionに保存</button>`;
    return `<div class="memo-card">
      <div class="memo-accent" style="background:${cat.color}"></div>
      <div class="memo-header">
        <div class="memo-badges">
          <span class="badge-cat" style="background:${cat.bg};color:${cat.color}">${cat.icon} ${m.category}</span>
          <span class="badge-pri" style="background:${priBg};color:${priColor}">${m.priority}</span>
        </div>
        <button class="btn-delete" onclick="deleteMemo(${m.id})">×</button>
      </div>
      <div class="memo-summary">${m.summary}</div>
      <div class="memo-text">${m.text}</div>
      ${tags?`<div class="memo-tags">${tags}</div>`:''}
      <div class="memo-footer"><span class="memo-date">${m.createdAt}</span>${notionBtn}</div>
    </div>`;
  }).join('');
}

function persist() { localStorage.setItem('vm_memos', JSON.stringify(memos)); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

renderFilters();
renderMemos();
</script>
</body>
</html>
